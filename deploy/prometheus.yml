global:
  scrape_interval: 5s

scrape_configs:
  - job_name: notifier-api
    static_configs:
      - targets: ["api:8080"]

  - job_name: notifier-worker
    static_configs:
      - targets: ["worker:8081"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
