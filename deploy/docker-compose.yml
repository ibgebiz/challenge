services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notifier
      POSTGRES_PASSWORD: notifier
      POSTGRES_DB: notifier
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifier"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4318:4318"   # OTLP HTTP

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/api"]
    environment: &app-env
      HTTP_PORT: "8080"
      POSTGRES_DSN: "postgres://notifier:notifier@postgres:5432/notifier?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      RATE_LIMIT_PER_SEC: "100"
      MAX_RETRY_ATTEMPTS: "5"
      RETRY_INTERVAL: "30s"
      SCHEDULER_POLL_INTERVAL: "5s"
      WORKER_CONCURRENCY: "10"
      PROVIDER_URL: "${PROVIDER_URL:-https://webhook.site/your-uuid-here}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    environment: *app-env
    # Scale horizontally with: docker compose up --scale worker=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/app/scheduler"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
